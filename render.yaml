databases:
  - name: mayor4code-db
    databaseName: mayor4code
    user: mayor4code
    plan: free

services:
  - type: web
    name: mayor4code
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py seed_lessons &&
      python manage.py create_admin
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: mayor4code.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: mayor4code-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        value: admin@mayor4code.com
