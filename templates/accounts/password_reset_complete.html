{% extends 'base_public.html' %}
{% block title %}Password Reset Complete — mayor4code{% endblock %}

{% block content %}
<div style="max-width:480px;margin:80px auto;text-align:center;padding:0 24px;">
  <div style="font-size:4rem;margin-bottom:20px;">✅</div>
  <h1 style="font-size:var(--text-3xl);margin-bottom:12px;">Password updated!</h1>
  <p style="color:var(--muted);line-height:1.75;margin-bottom:32px;">
    Your password has been reset successfully. You can now sign in with your new password.
  </p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
    <i class="ti ti-login"></i> Sign In Now
  </a>
</div>
{% endblock %}
