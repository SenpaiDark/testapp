{% extends 'base_public.html' %}
{% block title %}Check Your Email — mayor4code{% endblock %}

{% block content %}
<div style="max-width:480px;margin:80px auto;text-align:center;padding:0 24px;">
  <div style="font-size:4rem;margin-bottom:20px;">📧</div>
  <h1 style="font-size:var(--text-3xl);margin-bottom:12px;">Check your email</h1>
  <p style="color:var(--muted);line-height:1.75;margin-bottom:32px;">
    If that email is registered, we've sent a password reset link. Check your inbox (and spam folder just in case).
  </p>
  <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
    <i class="ti ti-arrow-left"></i> Back to Login
  </a>
</div>
{% endblock %}
