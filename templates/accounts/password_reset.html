{% extends 'base.html' %}
{% block title %}Reset Password — mayor4code{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="auth-brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span>mayor<span>4</span>code</span>
    </div>

    <h2>Reset Password</h2>
    <p class="sub">Enter your email and we'll send you a reset link.</p>

    <form method="post" class="form-grid">
      {% csrf_token %}
      <div class="form-field floating-wrap has-icon">
        <input type="email" name="email" id="id_email" required autofocus placeholder=" ">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/>
        </svg>
        <label for="id_email">Email</label>
      </div>
      <button class="btn btn-primary" type="submit"><span class="btn-text">Send Reset Link</span></button>
    </form>

    <p class="auth-footer">
      <a href="{% url 'login' %}">Back to Login</a>
    </p>
  </div>
</div>
{% endblock %}
