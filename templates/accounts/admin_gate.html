<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Access — mayor4code</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/favicon-admin.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .gate-card {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .gate-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .gate-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00875A, #0891b2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #fff;
    }

    .gate-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .gate-logo-text span {
      color: #60a5fa;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .gate-sub {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #00875A;
    }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00875A, #0891b2);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { opacity: 0.9; }

    .gate-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #374151;
    }

    .gate-footer a {
      color: #4b5563;
      text-decoration: none;
    }

    .gate-footer a:hover { color: #6b7280; }
  </style>
</head>
<body>
  <div class="gate-card">
    <div class="gate-logo">
      <div class="gate-logo-icon">⚙</div>
      <div class="gate-logo-text">mayor<span>4code</span></div>
    </div>

    <h1>Admin Access</h1>
    <p class="gate-sub">Restricted area. Authorised personnel only.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Any username" autocomplete="off" />

      <label for="password">Admin Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="off" />

      <button type="submit">Enter Admin Panel</button>
    </form>

    <div class="gate-footer">
      <a href="/">← Back to site</a>
    </div>
  </div>
</body>
</html>
